<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="meta-description" name="description" content="" />
    <title>Vitrine Moda | Catálogo de Moda</title>
    <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg?v=20" />
    <link rel="shortcut icon" href="/assets/brand/favicon.svg?v=20" />
    <link rel="apple-touch-icon" href="/assets/brand/favicon.svg?v=20" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="inicio">
      <nav class="nav container" aria-label="Menu principal">
        <a class="brand" href="#inicio" id="header-brand">
          <span class="brand-mark" id="brand-mark" aria-hidden="true">
            VM
          </span>
          <span class="brand-copy">
            <span class="brand-name" data-store-name>Vitrine Moda</span>
            <span class="brand-slogan" data-store-slogan>Moda que realça você</span>
          </span>
        </a>

        <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-menu">
          <span></span>
          <span></span>
          <span></span>
          <span class="sr-only">Abrir menu</span>
        </button>

        <div class="nav-links mobile-menu" id="main-menu"></div>

        <a class="header-whatsapp" data-whatsapp-general href="#" target="_blank" rel="noopener"></a>
      </nav>
    </header>
    <button class="menu-backdrop mobile-menu-overlay" type="button" aria-label="Fechar menu"></button>

    <main>
      <section class="hero section-band">
        <div class="container hero-showcase">
          <div class="hero-media" aria-label="Vitrine principal Vitrine Moda">
            <img id="hero-image" src="" alt="" />
            <div class="hero-overlay">
              <p class="eyebrow" id="hero-eyebrow"></p>
              <h1 id="hero-title"></h1>
              <p class="hero-slogan" id="hero-slogan"></p>
              <p id="hero-subtitle"></p>
              <div class="hero-actions">
                <a class="btn btn-primary" href="#catalogo" id="hero-catalog-button"></a>
                <a class="btn btn-whatsapp" data-whatsapp-general href="#" target="_blank" rel="noopener"></a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section section-soft" id="novidades" aria-labelledby="novidades-title">
        <div class="container">
          <div class="section-heading split-heading">
            <div>
              <p class="eyebrow" id="news-eyebrow"></p>
              <h2 id="novidades-title"></h2>
              <p class="section-description" id="news-description"></p>
            </div>
            <a class="text-link" href="#catalogo" id="catalog-link"></a>
          </div>
          <div class="product-grid" id="featured-products"></div>
        </div>
      </section>

      <section class="section" id="catalogo" aria-labelledby="catalogo-title">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow" id="catalog-eyebrow"></p>
            <h2 id="catalogo-title"></h2>
            <p class="section-description" id="catalog-description"></p>
          </div>

          <div class="filter-bar" id="filter-bar" aria-label="Filtros do catálogo"></div>
          <div class="catalog-feedback" id="catalog-feedback" aria-live="polite"></div>
          <div class="product-grid" id="catalog-products"></div>
        </div>
      </section>

      <section class="section promo-section" id="promocoes" aria-labelledby="promocoes-title">
        <div class="container">
          <div class="promo-banner">
            <div>
              <p class="eyebrow" id="promo-eyebrow"></p>
              <h2 id="promocoes-title"></h2>
              <p id="promo-text"></p>
            </div>
            <a class="btn btn-light" href="#catalogo" data-filter-link="Promoções" id="promo-action"></a>
          </div>
          <div class="product-grid" id="promo-products"></div>
        </div>
      </section>

      <section class="section" id="looks" aria-labelledby="looks-title">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow" id="looks-eyebrow"></p>
            <h2 id="looks-title"></h2>
          </div>
          <div class="look-grid" id="look-grid"></div>
        </div>
      </section>

      <section class="section section-soft" id="contato" aria-labelledby="contato-title">
        <div class="container contact-grid">
          <div>
            <p class="eyebrow" id="contact-eyebrow"></p>
            <h2 id="contato-title"></h2>
            <p id="contact-text"></p>
            <div class="contact-actions">
              <a class="btn btn-whatsapp" data-whatsapp-general href="#" target="_blank" rel="noopener"></a>
              <a class="btn btn-outline" id="instagram-link" href="#" target="_blank" rel="noopener"></a>
            </div>
          </div>

          <div class="contact-card">
            <h3 id="contact-card-title"></h3>
            <ul>
              <li><strong>WhatsApp:</strong> <span id="contact-whatsapp"></span></li>
              <li><strong>Instagram:</strong> <span id="contact-instagram"></span></li>
              <li><strong>Cidade:</strong> <span id="contact-city"></span></li>
              <li><strong>Pagamento:</strong> <span id="contact-payment"></span></li>
              <li><strong>Entrega:</strong> <span id="contact-delivery"></span></li>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <div class="product-modal" id="product-modal" hidden>
      <button class="product-modal-backdrop" type="button" data-modal-close aria-label="Fechar detalhes do produto"></button>
      <section class="product-modal-panel" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
        <button class="product-modal-close" type="button" data-modal-close aria-label="Fechar detalhes">×</button>
        <div class="product-modal-content" id="product-modal-content"></div>
      </section>
    </div>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div>
          <a class="brand footer-brand" href="#inicio">
            <span class="brand-mark" aria-hidden="true">
              VM
            </span>
            <span class="brand-copy">
              <span class="brand-name" data-store-name>Vitrine Moda</span>
              <span class="brand-slogan" data-store-slogan>Moda que realça você</span>
            </span>
          </a>
          <p id="footer-text"></p>
        </div>
        <div class="footer-links">
          <a id="footer-instagram" href="#" target="_blank" rel="noopener">Instagram</a>
          <a data-whatsapp-general href="#" target="_blank" rel="noopener">WhatsApp</a>
        </div>
      </div>
      <div class="container copyright">
        <span>© <span id="current-year"></span> <span data-store-name>Vitrine Moda</span>. <span id="footer-rights"></span></span>
      </div>
    </footer>

    <script src="products.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-service.js"></script>
    <script src="script.js"></script>
  </body>
</html>
